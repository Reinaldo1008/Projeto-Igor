<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus</title>
    <link rel="icon" type="image/png" href="css/loginempréstimo.png"> 
    <script src="https://kit.fontawesome.com/eb30bb42fe.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <div class="info-box">
            <img src="css/booklogin.png" alt="ilustração">
        </div>

        <div class="form-box login">
            <form id="formLogin">
                <img src="css/loginempréstimo.png" alt="Logo" class="logo-top">
                <h1>Login</h1>

                <div class="input-box">
                    <input type="text" placeholder="CPF ou Matrícula" name="cpf_matricula" required>
                    <i class="fa-solid fa-id-card"></i>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Senha" name="senha" required>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="remember-forgot">
                    <label>
                        <input type="checkbox"> Lembrar de mim
                    </label>
                    <a href="#">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn">Login</button>

                <p>Faça login com o Google</p>
                <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-google"></i></a>
                </div>

                <p class="register-link">
                    Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
                </p>

            </form>
        </div>

    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async function(e) {
            e.preventDefault();

            const identificador = document.querySelector('input[name="cpf_matricula"]').value;
            const senha = document.querySelector('input[name="senha"]').value;

            try {
                const resposta = await fetch('https://projeto-igor.onrender.com', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identificador, senha })
                });

                const dados = await resposta.json();

                if (resposta.ok) {
                    sessionStorage.setItem('usuario', JSON.stringify(dados.usuario));
                    alert('Bem-vindo, ' + dados.usuario.nome + '!');
                    if (dados.usuario.tipo === 'adm') {
                        window.location.href = 'adm.html';
                    } else {
                        window.location.href = 'usuario.html';
                    }
                } else {
                    alert('Erro: ' + dados.detail);
                }
            } catch (erro) {
                alert('Não foi possível conectar à API. Contate o suporte.');
            }
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus</title>
    <link rel="icon" type="image/png" href="css/loginempréstimo.png">
    <script src="https://kit.fontawesome.com/eb30bb42fe.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <div class="info-box">
            <img src="css/booklogin.png" alt="ilustração">
        </div>

        <div class="form-box login">
            <form id="formCadastro">
                <img src="css/loginempréstimo.png" alt="Logo" class="logo-top">
                <h1>Cadastro</h1>

                <div class="input-box">
                    <input type="text" placeholder="Nome completo" name="nome" required>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="input-box">
                    <input type="text" placeholder="CPF ou Matrícula" name="cpf_matricula" required>
                    <i class="fa-solid fa-id-card"></i>
                </div>

                <div class="input-box">
                    <input type="email" placeholder="E-mail" name="email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Senha" name="senha" required>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Confirmar senha" name="confirmar_senha" required>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="input-box">
                    <select name="tipo" required>
                        <option value="" disabled selected>Selecione o tipo de usuário</option>
                        <option value="aluno">Aluno</option>
                        <option value="professor">Professor</option>
                    </select>
                    <i class="fa-solid fa-users"></i>
                </div>

                <div class="remember-forgot">
                    <label>
                        <input type="checkbox" required> Aceito os <a href="#">termos de uso</a>
                    </label>
                </div>

                <button type="submit" class="btn">Cadastrar</button>

                <p class="register-link">
                    Já tem uma conta? <a href="index.html">Faça login</a>
                </p>
            </form>
        </div>

    </div>

    <script>
        document.getElementById('formCadastro').addEventListener('submit', async function(e) {
            e.preventDefault();

            const nome     = document.querySelector('input[name="nome"]').value;
            const cpf      = document.querySelector('input[name="cpf_matricula"]').value;
            const email    = document.querySelector('input[type="email"]').value;
            const senha    = document.querySelector('input[name="senha"]').value;
            const confirmar = document.querySelector('input[name="confirmar_senha"]').value;
            const tipo     = document.querySelector('select[name="tipo"]').value;

            if (senha !== confirmar) {
                alert('As senhas não coincidem!');
                return;
            }

            try {
                const resposta = await fetch('https://projeto-igor.onrender.com/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cpf, senha, email, nome, tipo })
                });

                const dados = await resposta.json();

                if (resposta.ok) {
                    alert('Cadastro realizado com sucesso!');
                    window.location.href = 'index.html';
                } else {
                    alert('Erro: ' + dados.detail);
                }
            } catch (erro) {
                alert('Não foi possível conectar à API. Verifique se o servidor está rodando.');
            }
        });
    </script>

</body>
</html>

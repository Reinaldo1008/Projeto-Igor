<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus</title>
    <link rel="icon" type="image/png" href="css/loginempréstimo.png">
    <script src="https://kit.fontawesome.com/eb30bb42fe.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <div class="info-box">
            <img src="css/booklogin.png" alt="ilustração">
        </div>

        <div class="form-box login">
            <form action="">
                <img src="css/loginempréstimo.png" alt="Logo" class="logo-top">
                <h1>Cadastro</h1>

                <div class="input-box">
                    <input type="text" placeholder="Nome completo" name="nome" required>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="input-box">
                    <input type="text" placeholder="CPF ou Matrícula" name="cpf_matricula" required>
                    <i class="fa-solid fa-id-card"></i>
                </div>

                <div class="input-box">
                    <input type="email" placeholder="E-mail" name="email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Senha" name="senha" required>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Confirmar senha" name="confirmar_senha" required>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="remember-forgot">
                    <label>
                        <input type="checkbox" required> Aceito os <a href="#">termos de uso</a>
                    </label>
                </div>

                <button type="submit" class="btn">Cadastrar</button>

                <p class="register-link">
                    Já tem uma conta? <a href="index.html">Faça login</a>
                </p>
            </form>
        </div>

    </div>

</body>
</html>
